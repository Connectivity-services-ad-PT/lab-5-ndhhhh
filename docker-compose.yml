version: "3.8"

services:
  # Service API FastAPI
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fit4110-api-lab05
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - team-internal
      - class-net
    ports:
      - "${APP_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s       # Giảm xuống 10s để kiểm tra nhanh hơn khi chấm bài
      timeout: 5s
      retries: 3
      start_period: 5s

  # PostgreSQL database service
  db:
    image: postgres:15-alpine
    container_name: fit4110-db-lab05
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lab05}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lab05pass}
      POSTGRES_DB: ${POSTGRES_DB:-iotdb}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - team-internal
    healthcheck:
      # Sửa cú pháp truyền biến môi trường an toàn trong Docker Compose (dùng $$)
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # AI service mẫu dùng Python HTTP server hoặc FastAPI
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
    # Ghi đè lệnh để chạy riêng dịch vụ AI trên cổng 9000
    command: ["uvicorn", "ai_service.main:app", "--app-dir", "src", "--host", "0.0.0.0", "--port", "9000"]
    container_name: fit4110-ai-lab05
    env_file:
      - .env
    ports:
      - "9000:9000" # Mở cổng để bạn có thể test riêng dịch vụ AI từ máy local
    networks:
      - team-internal
    healthcheck:
      # Sử dụng lệnh curl từ Dockerfile (đã cài sẵn apk add curl ở bước trước) giúp test cực nhanh và chuẩn xác
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  team-internal:
    driver: bridge
  class-net:
    external: true

volumes:
  db-data: